name: Deploy Backend Service to Dev Cloud

on:
  push:
    branches:
      - develop
    paths:
      - 'open-erp-services/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: open-erp-services

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: open-erp-services/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Log in to Docker Hub/Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./open-erp-services
          push: true
          tags: myregistry/open-erp-services:${{ github.sha }}

      - name: Configure Cloud Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy to Kubernetes Cluster (EKS)
        run: |
          aws eks update-kubeconfig --name open-erp-dev-cluster
          kubectl set image deployment/backend-services-deploy backend-services=myregistry/open-erp-services:${{ github.sha }}
          kubectl rollout status deployment/backend-services-deploy
