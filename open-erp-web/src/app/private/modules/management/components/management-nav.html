<nav
  id="management-nav"
  class="flex flex-col h-full bg-surface-0 dark:bg-surface-900 border-r border-surface-200 dark:border-surface-700 transition-all duration-300"
  [class.w-14]="navMode() === 'narrow'"
  [class.w-64]="navMode() === 'sidebar'"
  role="navigation"
  [attr.aria-label]="'management.title' | transloco"
>
  <!-- Header with toggle -->
  <div
    id="management-nav-header"
    class="flex items-center justify-between p-3 border-b border-surface-200 dark:border-surface-700"
    [class.justify-center]="navMode() === 'narrow'"
  >
    @if (navMode() === 'sidebar') {
    <h2
      id="management-nav-title"
      class="text-lg font-semibold text-surface-900 dark:text-surface-0"
    >
      {{ 'management.title' | transloco }}
    </h2>
    }
    <p-button
      id="management-nav-toggle"
      (onClick)="onToggleNavMode()"
      [icon]="navMode() === 'narrow' ? 'pi pi-angle-right' : 'pi pi-angle-left'"
      [text]="true"
      [rounded]="true"
      severity="secondary"
      size="small"
      [pTooltip]="'management.navigation.toggleNavMode' | transloco"
      tooltipPosition="right"
      [showDelay]="500"
      [attr.aria-label]="'management.navigation.toggleNavMode' | transloco"
      [attr.aria-expanded]="navMode() === 'sidebar'"
    />
  </div>

  <!-- Navigation items -->
  <div id="management-nav-items" class="flex-1 overflow-y-auto py-2">
    <app-navigation-menu
      [items]="items"
      [navMode]="navMode"
      [idPrefix]="'management-nav'"
      [emptyMessage]="'management.navigation.noItems'"
    />
  </div>
</nav>
