<header
  id="organization-header-tabs"
  class="bg-surface-0 dark:bg-surface-900 border-b border-surface-200 dark:border-surface-700"
  role="banner"
>
  <div id="organization-tabs-container" class="flex items-center px-4">
    <nav
      id="organization-tabs-nav"
      class="flex w-full"
      role="navigation"
      [attr.aria-label]="'organization.title' | transloco"
    >
      <!-- Register Tab -->
      <a
        id="organization-tab-register"
        routerLink="new"
        routerLinkActive="border-b-2 border-primary-500 text-primary-700 dark:text-primary-300"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex-1 flex items-center justify-center gap-2 px-4 py-3 text-sm font-medium text-surface-600 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-0 transition-colors border-b-2 border-transparent"
        [attr.aria-label]="'organization.tabs.register' | transloco"
        [attr.aria-current]="isActive('new') ? 'page' : null"
      >
        <i class="pi pi-building" aria-hidden="true"></i>
        <span>{{ 'organization.tabs.register' | transloco }}</span>
      </a>

      <!-- Information Tab -->
      <a
        id="organization-tab-detail"
        [routerLink]="[curentOrganization()?.id]"
        routerLinkActive="border-b-2 border-primary-500 text-primary-700 dark:text-primary-300"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex-1 flex items-center justify-center gap-2 px-4 py-3 text-sm font-medium text-surface-600 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-0 transition-colors border-b-2 border-transparent"
        [attr.aria-label]="'organization.tabs.info' | transloco"
        [attr.aria-current]="isActive('detail') ? 'page' : null"
      >
        <i class="pi pi-info-circle" aria-hidden="true"></i>
        <span>{{ 'organization.tabs.info' | transloco }}</span>
      </a>
    </nav>
  </div>
</header>
