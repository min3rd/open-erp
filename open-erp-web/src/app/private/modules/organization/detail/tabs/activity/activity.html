<p-card id="organization-activity-card">
  <h2
    id="organization-activity-title"
    class="text-lg font-semibold text-surface-900 dark:text-surface-0 mb-4"
  >
    {{ 'organization.detail.tabs.activity' | transloco }}
  </h2>
  @if (events().length > 0) {
    <div class="space-y-3">
      @for (event of events(); track event.id) {
        <p-card>
          <h4 class="font-semibold">{{ event.type }}</h4>
          <p class="text-sm">{{ event.description }}</p>
          <p class="text-xs text-surface-500">{{ event.createdAt | userDate }}</p>
        </p-card>
      }
    </div>
  } @else {
    <div class="text-center py-8">
      <i class="pi pi-history text-4xl text-surface-400 mb-4"></i>
      <p class="text-surface-600 dark:text-surface-400">
        {{ 'organization.detail.activity.empty' | transloco }}
      </p>
    </div>
  }
</p-card>
