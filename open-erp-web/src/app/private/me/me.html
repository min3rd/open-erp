<div class="flex flex-col h-full overflow-auto bg-surface-50 dark:bg-surface-950">
  <!-- Header with user info summary -->
  <div class="bg-white dark:bg-surface-900 border-b border-surface-200 dark:border-surface-700 px-4 lg:px-6 py-4">
    <div class="max-w-5xl mx-auto">
      <div class="flex items-center gap-4">
        @if (isLoading()) {
          <p-skeleton shape="circle" size="3.5rem"></p-skeleton>
          <div class="flex flex-col gap-1">
            <p-skeleton width="8rem" height="1.25rem"></p-skeleton>
            <p-skeleton width="12rem" height="1rem"></p-skeleton>
          </div>
        } @else if (profile()) {
          <p-avatar
            [image]="profile()!.avatarUrl || undefined"
            [label]="!profile()!.avatarUrl ? (profile()!.fullName?.[0] || profile()!.email?.[0] || 'U').toUpperCase() : undefined"
            shape="circle"
            size="xlarge"
            class="flex-shrink-0"
          ></p-avatar>
          <div>
            <h1 class="text-lg font-semibold text-surface-900 dark:text-surface-100 leading-tight">
              {{ profile()!.fullName || profile()!.username || profile()!.email }}
            </h1>
            <p class="text-sm text-surface-500 dark:text-surface-400">{{ profile()!.email }}</p>
          </div>
        }
      </div>

      <!-- Tab navigation -->
      <nav class="flex mt-4 gap-1 border-b border-surface-200 dark:border-surface-700 -mb-px" role="tablist">
        @for (tab of tabs; track tab.index) {
          <button
            type="button"
            role="tab"
            [attr.aria-selected]="activeTab() === tab.index"
            (click)="navigateToTab(tab.index)"
            class="px-4 py-2 text-sm font-medium border-b-2 transition-colors duration-150 focus:outline-none whitespace-nowrap"
            [class]="activeTab() === tab.index
              ? 'border-primary-500 text-primary-600 dark:text-primary-400'
              : 'border-transparent text-surface-600 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-100 hover:border-surface-300'"
          >
            {{ tab.label }}
          </button>
        }
      </nav>
    </div>
  </div>

  <!-- Routed content -->
  <div class="flex-1 overflow-auto">
    <div class="max-w-5xl mx-auto px-4 lg:px-6 py-6">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
