<p-toast></p-toast>

<div class="space-y-6">
  @if (isLoading()) {
    <div class="bg-white dark:bg-surface-900 rounded-lg border border-surface-200 dark:border-surface-700 p-6 space-y-4">
      @for (i of [1, 2, 3, 4]; track i) {
        <div class="flex items-center justify-between">
          <p-skeleton width="8rem" height="1rem"></p-skeleton>
          <p-skeleton width="10rem" height="2.25rem"></p-skeleton>
        </div>
      }
    </div>
  } @else {
    <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
      <!-- Display preferences -->
      <div class="bg-white dark:bg-surface-900 rounded-lg border border-surface-200 dark:border-surface-700">
        <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700">
          <h3 class="text-base font-semibold text-surface-900 dark:text-surface-100">Hiển thị</h3>
        </div>
        <div class="p-6 space-y-5">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- Date format -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-medium text-surface-700 dark:text-surface-300">Định dạng ngày tháng</label>
              <p-select
                formControlName="dateFormat"
                [options]="dateFormats"
                optionLabel="label"
                optionValue="value"
                styleClass="w-full"
              ></p-select>
            </div>

            <!-- Timezone -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-medium text-surface-700 dark:text-surface-300">Múi giờ</label>
              <p-select
                formControlName="timezone"
                [options]="timezones"
                optionLabel="label"
                optionValue="value"
                styleClass="w-full"
              ></p-select>
            </div>

            <!-- Theme -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-medium text-surface-700 dark:text-surface-300">Giao diện</label>
              <p-select
                formControlName="theme"
                [options]="themes"
                optionLabel="label"
                optionValue="value"
                styleClass="w-full"
              ></p-select>
            </div>

            <!-- Language -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-medium text-surface-700 dark:text-surface-300">Ngôn ngữ</label>
              <p-select
                formControlName="language"
                [options]="languages"
                optionLabel="label"
                optionValue="value"
                styleClass="w-full"
              ></p-select>
            </div>

            <!-- Layout density -->
            <div class="flex flex-col gap-1.5">
              <label class="text-sm font-medium text-surface-700 dark:text-surface-300">Mật độ bố cục</label>
              <p-select
                formControlName="layoutDensity"
                [options]="densities"
                optionLabel="label"
                optionValue="value"
                styleClass="w-full"
              ></p-select>
            </div>
          </div>
        </div>
      </div>

      <!-- Notification preferences -->
      <div class="bg-white dark:bg-surface-900 rounded-lg border border-surface-200 dark:border-surface-700 mt-6">
        <div class="px-6 py-4 border-b border-surface-200 dark:border-surface-700">
          <h3 class="text-base font-semibold text-surface-900 dark:text-surface-100">Thông báo</h3>
        </div>
        <div class="p-6 space-y-4">
          <div class="flex items-center justify-between py-1">
            <div>
              <p class="text-sm font-medium text-surface-800 dark:text-surface-200">Thông báo trong ứng dụng</p>
              <p class="text-xs text-surface-500 dark:text-surface-400 mt-0.5">Nhận thông báo ngay trong ứng dụng</p>
            </div>
            <p-toggleswitch formControlName="notificationsInApp"></p-toggleswitch>
          </div>

          <p-divider styleClass="my-0"></p-divider>

          <div class="flex items-center justify-between py-1">
            <div>
              <p class="text-sm font-medium text-surface-800 dark:text-surface-200">Thông báo qua email</p>
              <p class="text-xs text-surface-500 dark:text-surface-400 mt-0.5">Nhận thông báo quan trọng qua email</p>
            </div>
            <p-toggleswitch formControlName="notificationsEmail"></p-toggleswitch>
          </div>

          <p-divider styleClass="my-0"></p-divider>

          <div class="flex items-center justify-between py-1">
            <div>
              <p class="text-sm font-medium text-surface-800 dark:text-surface-200">Thông báo đẩy</p>
              <p class="text-xs text-surface-500 dark:text-surface-400 mt-0.5">Nhận thông báo đẩy trên trình duyệt</p>
            </div>
            <p-toggleswitch formControlName="notificationsPush"></p-toggleswitch>
          </div>
        </div>
      </div>

      <!-- Save / Reset buttons -->
      <div class="flex gap-3 justify-end mt-6">
        <p-button
          label="Đặt lại mặc định"
          severity="secondary"
          size="small"
          type="button"
          (onClick)="resetSettings()"
        ></p-button>
        <p-button
          label="Lưu cài đặt"
          icon="pi pi-check"
          size="small"
          type="submit"
          [loading]="isSaving()"
        ></p-button>
      </div>
    </form>
  }
</div>
