<!-- Wrapper -->
<div class="flex w-full flex-auto flex-col" id="empty-layout-wrapper">
  <!-- Content -->
  <div class="flex flex-auto flex-col" id="empty-layout-content">
    <!-- *ngIf="true" hack is required here for router-outlet to work correctly.
             Otherwise, layout changes won't be registered and the view won't be updated! -->
    @if (true) {
      <router-outlet id="empty-layout-outlet"></router-outlet>
    }
  </div>
</div>
