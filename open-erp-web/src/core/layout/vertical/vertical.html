<!-- Wrapper -->
<div class="flex flex-col md:flex-row w-full h-screen overflow-hidden" id="vertical-layout-wrapper">
  <!-- Mobile Header with Hamburger Menu -->
  <div
    id="vertical-layout-mobile-header"
    class="flex lg:hidden items-center justify-between px-4 py-3 border-b border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900 animate-fade-down animate-duration-300"
  >
    <h1
      class="text-xl font-semibold text-surface-900 dark:text-surface-0"
      id="vertical-layout-mobile-title"
    >
      {{ 'common.title' | transloco }}
    </h1>
    <div class="flex items-center gap-2" id="vertical-layout-mobile-actions">
      <p-button
        id="vertical-layout-mobile-quick-chat-toggle"
        (onClick)="toggleQuickChat()"
        icon="pi pi-comments"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        size="large"
        class="w-11 h-11"
        [ariaLabel]="'quickChat.toggle' | transloco"
      />
      <p-button
        id="vertical-layout-mobile-sidebar-toggle"
        (onClick)="toggleSidebar()"
        icon="pi pi-bars"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        size="large"
        class="w-11 h-11"
        [ariaLabel]="'navigation.toggle' | transloco"
      />
    </div>
  </div>

  <!-- Navigation Sidebar -->
  <div
    id="vertical-layout-sidebar"
    [class.hidden]="!sidebarVisible() && isMobile()"
    [class.fixed]="isMobile()"
    [class.z-50]="isMobile()"
    [class.inset-0]="isMobile()"
    role="dialog"
    class="flex flex-col flex-auto h-full"
    [attr.aria-hidden]="!sidebarVisible() && isMobile()"
    [attr.aria-label]="'navigation.menu' | transloco"
  >
    <!-- Overlay for mobile -->
    @if (isMobile() && sidebarVisible()) {
    <div
      id="vertical-layout-sidebar-overlay"
      (click)="toggleSidebar()"
      class="fixed inset-0 bg-black/50 animate-fade-in animate-duration-300"
      aria-hidden="true"
    ></div>
    }

    <!-- Sidebar content -->
    <div
      id="vertical-layout-sidebar-content"
      [class.animate-fadeinleft]="isMobile() && sidebarVisible()"
      [class.animate-fadeoutleft]="isMobile() && !sidebarVisible()"
      [class.flex-col]="isMobile()"
      class="flex h-full bg-surface-0 dark:bg-surface-900 border-r border-surface-200 dark:border-surface-700 w-80 md:w-auto z-50"
    >
      <layout-vertical-navigation [isMobile]="isMobile()"></layout-vertical-navigation>
    </div>
  </div>

  <!-- Content Area -->
  <main
    id="main-content"
    class="relative w-full h-full overflow-hidden bg-surface-50 dark:bg-surface-950"
    role="main"
  >
    <!-- *ngIf="true" hack is required here for router-outlet to work correctly. Otherwise, layout changes won't be registered and the view won't be updated! -->
    @if (true) {
    <router-outlet></router-outlet>
    }
  </main>

  <!-- Quick Chat Panel -->
  @if (quickChatVisible() || !isMobile()) {
  <aside
    id="vertical-layout-quick-chat"
    [class.fixed]="isMobile()"
    [class.right-0]="isMobile()"
    [class.top-0]="isMobile()"
    [class.bottom-0]="isMobile()"
    [class.z-40]="isMobile()"
    [class.animate-slide-in-right]="isMobile() && quickChatVisible()"
    [class.hidden]="isMobile() && !quickChatVisible()"
    class="lg:relative w-full lg:w-auto"
    role="complementary"
    [attr.aria-label]="'quickChat.panel' | transloco"
    [attr.aria-hidden]="isMobile() && !quickChatVisible()"
  >
    <!-- Overlay for mobile -->
    @if (isMobile() && quickChatVisible()) {
    <div
      id="vertical-layout-quick-chat-overlay"
      (click)="toggleQuickChat()"
      class="fixed inset-0 bg-black/50 animate-fade-in animate-duration-300"
      aria-hidden="true"
    ></div>
    }

    <!-- Quick chat content -->
    <div
      class="relative h-full bg-surface-0 dark:bg-surface-900 w-80 lg:w-auto z-40"
      id="vertical-layout-quick-chat-content"
    >
      <layout-quick-chat></layout-quick-chat>
    </div>
  </aside>
  }
</div>
