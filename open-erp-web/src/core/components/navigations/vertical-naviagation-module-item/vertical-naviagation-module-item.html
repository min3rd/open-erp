<div
  pRipple
  [pTooltip]="label()"
  tooltipPosition="right"
  class="flex items-center md:justify-center gap-3 p-2 rounded-lg border border-surface-200 dark:border-surface-700 cursor-pointer transition-all duration-200 hover:bg-primary-50 hover:border-primary-500 dark:hover:bg-primary-900/20 dark:hover:border-primary-400 select-none min-h-11 lg:flex-col lg:text-center lg:gap-1 lg:px-2 lg:min-w-16 animate-fade-in animate-duration-300 hover:scale-105 active:scale-95"
  [class.bg-primary-50]="isActive()"
  [class.border-primary-500]="isActive()"
  [class.dark:bg-primary-900/20]="isActive()"
  role="button"
  tabindex="0"
  [attr.aria-label]="label()"
  [attr.id]="'nav-module-item-' + elementId()"
>
  @if (icon()) {
  <span [class]="icon() + ' text-xl text-surface-700 dark:text-surface-300'" [attr.id]="'nav-module-item-icon-' + elementId()"></span>
  }
  @if (label() && showLabel()) {
    <span class="text-xs text-surface-900 dark:text-surface-0 lg:text-xs lg:truncate lg:max-w-full" [attr.id]="'nav-module-item-label-' + elementId()">
      {{ label() }}
    </span>
  }
</div>
