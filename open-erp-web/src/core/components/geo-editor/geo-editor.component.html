<div id="geo-editor-container" class="flex flex-col gap-2">
  <label class="font-medium text-sm">
    {{ 'provinceList.geoEditor.label' | transloco }}
  </label>

  <p-tabs [(value)]="activeTab">
    <p-tablist>
      <p-tab [value]="0">
        <i class="pi pi-pencil mr-2"></i>
        {{ 'provinceList.geoEditor.textTab' | transloco }}
      </p-tab>
      <p-tab [value]="1">
        <i class="pi pi-map mr-2"></i>
        {{ 'provinceList.geoEditor.drawTab' | transloco }}
      </p-tab>
    </p-tablist>
    
    <p-tabpanels>
      <!-- Text Editor Tab -->
      <p-tabpanel [value]="0">
        <div class="flex flex-col gap-2">
          <textarea
            id="geo-editor-textarea"
            pTextarea
            [value]="geoJsonText()"
            (input)="onTextChange($any($event.target).value)"
            [rows]="10"
            [placeholder]="'provinceList.geoEditor.placeholder' | transloco"
            class="w-full font-mono text-sm"
            [attr.aria-label]="'provinceList.geoEditor.label' | transloco"
            [class.border-red-500]="parseError()"
          ></textarea>

          @if (parseError()) {
          <small id="geo-editor-error" class="text-red-500">
            {{ parseError() }}
          </small>
          }

          <div class="flex gap-2">
            <p-button
              id="geo-editor-apply-button"
              [label]="'provinceList.geoEditor.apply' | transloco"
              icon="pi pi-check"
              (onClick)="onApply()"
              severity="primary"
            />
            <p-button
              id="geo-editor-clear-button"
              [label]="'provinceList.geoEditor.clear' | transloco"
              icon="pi pi-times"
              (onClick)="onClear()"
              severity="secondary"
              [outlined]="true"
            />
          </div>
        </div>
      </p-tabpanel>

      <!-- Draw Map Tab -->
      <p-tabpanel [value]="1">
        <div class="h-96">
          <core-draw-map
            [geometry]="extractedGeometry()"
            (geometryChange)="onDrawMapGeometryChange($event)"
            [editable]="true"
          />
        </div>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
