apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: open-erp
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: open-erp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 3000
