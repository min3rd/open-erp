services:
  api-gateway:
    image: ghcr.io/open-erp/api-gateway:${IMAGE_TAG}
    environment:
      NODE_ENV: staging
      PORT: 3000
      MONGO_URI: ${MONGO_URI}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
