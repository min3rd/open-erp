apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-erp-postgres-pvc
  namespace: open-erp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-erp-postgres
  namespace: open-erp
  labels:
    app: open-erp-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-erp-postgres
  template:
    metadata:
      labels:
        app: open-erp-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: open-erp-secrets
              key: postgres-password
        - name: POSTGRES_DB
          value: "open_erp_dev"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: open-erp-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: open-erp-postgres-svc
  namespace: open-erp
spec:
  selector:
    app: open-erp-postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  type: ClusterIP
