apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-erp-backend
  namespace: open-erp
  labels:
    app: open-erp-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: open-erp-backend
  template:
    metadata:
      labels:
        app: open-erp-backend
    spec:
      containers:
      - name: backend-services
        image: myregistry/open-erp-services:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: open-erp-secrets
              key: database-url
        - name: REDIS_HOST
          value: "open-erp-redis-svc"
        - name: REDIS_PORT
          value: "6379"
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: open-erp-backend-svc
  namespace: open-erp
spec:
  selector:
    app: open-erp-backend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
