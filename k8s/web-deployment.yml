apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-erp-web
  namespace: open-erp
  labels:
    app: open-erp-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: open-erp-web
  template:
    metadata:
      labels:
        app: open-erp-web
    spec:
      containers:
      - name: web-frontend
        image: myregistry/open-erp-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: open-erp-web-svc
  namespace: open-erp
spec:
  selector:
    app: open-erp-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
