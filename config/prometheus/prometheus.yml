global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'open-erp-microservices'
    environment: 'development'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # RabbitMQ
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics'

  # Auth Service
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: '/auth/metrics'

  # Order Service
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:3004']
    metrics_path: '/orders/metrics'

  # Inventory Service
  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:3005']
    metrics_path: '/inventory/metrics'
