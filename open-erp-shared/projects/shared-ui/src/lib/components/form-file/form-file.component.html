<div class="flex flex-col w-full gap-1.5">

  <!-- Label -->
  @if (label()) {
    <label class="text-xs font-semibold text-slate-700 dark:text-slate-300 select-none">
      {{ label() }}
    </label>
  }

  <!-- Drop zone -->
  <label
    class="relative flex flex-col items-center justify-center w-full cursor-pointer rounded-xl border-2 border-dashed transition-all duration-200 p-6 gap-3 group"
    [ngClass]="[
      isDragOver()
        ? 'border-rose-gold-500 bg-rose-gold-50 dark:bg-rose-gold-950/20 scale-[1.01]'
        : showError
          ? 'border-red-400 bg-red-50 dark:bg-red-950/20'
          : 'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 hover:border-rose-gold-400 hover:bg-rose-gold-50/50 dark:hover:bg-rose-gold-950/10',
    ]"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <!-- Hidden input -->
    <input
      type="file"
      class="sr-only"
      [accept]="accept()"
      [multiple]="multiple()"
      (change)="onInputChange($event)"
    />

    <!-- Icon area -->
    <div class="w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200"
         [ngClass]="isDragOver() ? 'bg-rose-gold-100 dark:bg-rose-gold-900/30' : 'bg-slate-100 dark:bg-slate-700'">
      <oerp-icon name="upload-cloud" [size]="22"
        class="transition-colors"
        [ngClass]="isDragOver() ? 'text-rose-gold-500' : 'text-slate-400 group-hover:text-rose-gold-400'" />
    </div>

    <!-- Text -->
    <div class="text-center">
      <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">
        {{ 'form.file_drop_hint' | transloco }}
        <span class="text-rose-gold-500 underline underline-offset-2">{{ 'form.file_drop_choose' | transloco }}</span>
      </p>
      <p class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">
        {{ accept() !== '*' ? accept() : ('form.file_drop_accept' | transloco) }}
        · {{ 'form.file_drop_max_size' | transloco : { max: (maxSizeBytes() / 1024 / 1024).toFixed(0) } }}
      </p>
    </div>
  </label>

  <!-- File list preview -->
  @if (files().length > 0) {
    <ul class="flex flex-col gap-2 mt-1">
      @for (f of files(); track f.name; let i = $index) {
        <li class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-sm">

          <!-- Image thumbnail hoặc file icon -->
          @if (f.previewUrl) {
            <img [src]="f.previewUrl" [alt]="f.name"
                 class="w-10 h-10 object-cover rounded-lg flex-shrink-0 border border-slate-100 dark:border-slate-700" />
          } @else {
            <div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center flex-shrink-0">
              <oerp-icon name="file" [size]="18" class="text-slate-400 dark:text-slate-500" />
            </div>
          }

          <!-- File info -->
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-slate-700 dark:text-slate-200 truncate">{{ f.name }}</p>
            <p class="text-xs text-slate-400 dark:text-slate-500">{{ formatBytes(f.size) }}</p>
          </div>

          <!-- Remove button -->
          <button
            type="button"
            (click)="removeFile(i)"
            class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors"
            [attr.aria-label]="'form.file_remove' | transloco"
          >
            <oerp-icon name="x" [size]="14" />
          </button>

        </li>
      }
    </ul>
  }

  <!-- Error message -->
  @if (showError && displayError) {
    <span class="text-xs font-medium text-red-500 animate-fade-in">{{ displayError }}</span>
  }

</div>
