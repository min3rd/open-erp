<div
  class="flex items-center gap-1 p-1 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border border-slate-200 dark:border-slate-700/80 rounded-xl shadow-lg select-none"
>
  <!-- 1. Auto-Layout -->
  <button
    (click)="layout.emit()"
    title="Tự động sắp xếp (Auto-layout)"
    class="p-2 text-slate-600 dark:text-slate-300 hover:text-rose-gold-500 dark:hover:text-rose-gold-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 rounded-lg transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="9" rx="1" />
      <rect x="14" y="3" width="7" height="5" rx="1" />
      <rect x="14" y="12" width="7" height="9" rx="1" />
      <rect x="3" y="16" width="7" height="5" rx="1" />
    </svg>
  </button>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700"></div>

  <!-- 2. Zoom In -->
  <button
    (click)="zoomIn.emit()"
    title="Phóng to"
    class="p-2 text-slate-600 dark:text-slate-300 hover:text-rose-gold-500 dark:hover:text-rose-gold-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 rounded-lg transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
      <line x1="11" y1="8" x2="11" y2="14" />
      <line x1="8" y1="11" x2="14" y2="11" />
    </svg>
  </button>

  <!-- 3. Zoom Out -->
  <button
    (click)="zoomOut.emit()"
    title="Thu nhỏ"
    class="p-2 text-slate-600 dark:text-slate-300 hover:text-rose-gold-500 dark:hover:text-rose-gold-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 rounded-lg transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
      <line x1="8" y1="11" x2="14" y2="11" />
    </svg>
  </button>

  <!-- 4. Fit view -->
  <button
    (click)="zoomFit.emit()"
    title="Thu phóng vừa màn hình (Fit View)"
    class="p-2 text-slate-600 dark:text-slate-300 hover:text-rose-gold-500 dark:hover:text-rose-gold-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 rounded-lg transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
    </svg>
  </button>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700"></div>

  <!-- 5. Toggle Grid -->
  <button
    (click)="toggleGrid.emit()"
    title="Ẩn/Hiện lưới nền (Grid)"
    class="p-2 text-slate-600 dark:text-slate-300 hover:text-rose-gold-500 dark:hover:text-rose-gold-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 rounded-lg transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="3,3" />
      <line x1="3" y1="9" x2="21" y2="9" />
      <line x1="3" y1="15" x2="21" y2="15" />
      <line x1="9" y1="3" x2="9" y2="21" />
      <line x1="15" y1="3" x2="15" y2="21" />
    </svg>
  </button>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700"></div>

  <!-- 6. Undo -->
  <button
    (click)="undo.emit()"
    [disabled]="!canUndo()"
    title="Hoàn tác (Ctrl+Z)"
    class="p-2 text-slate-600 dark:text-slate-300 hover:text-rose-gold-500 dark:hover:text-rose-gold-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 disabled:opacity-30 disabled:pointer-events-none rounded-lg transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7v6h6" />
      <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />
    </svg>
  </button>

  <!-- 7. Redo -->
  <button
    (click)="redo.emit()"
    [disabled]="!canRedo()"
    title="Làm lại (Ctrl+Y)"
    class="p-2 text-slate-600 dark:text-slate-300 hover:text-rose-gold-500 dark:hover:text-rose-gold-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 disabled:opacity-30 disabled:pointer-events-none rounded-lg transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 7v6h-6" />
      <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7" />
    </svg>
  </button>
</div>
