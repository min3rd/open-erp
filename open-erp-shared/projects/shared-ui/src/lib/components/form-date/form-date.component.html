<div class="flex flex-col w-full gap-1.5">
  <!-- Label -->
  @if (label()) {
    <label class="text-xs font-semibold text-slate-700 dark:text-slate-300 select-none">
      {{ label() }}
    </label>
  }

  <!-- Date input -->
  <div class="relative rounded-lg shadow-sm">
    <!-- Calendar icon -->
    <div
      class="absolute left-3.5 inset-y-0 flex items-center pointer-events-none text-slate-400 dark:text-slate-500"
    >
      <oerp-icon name="calendar" [size]="16" />
    </div>

    <input
      [type]="mode()"
      [formControl]="control()"
      [attr.min]="minDate() ?? null"
      [attr.max]="maxDate() ?? null"
      [ngClass]="[
        'block w-full pl-10 pr-3.5 py-2.5 rounded-lg border text-sm font-medium transition-all duration-150 outline-none bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100',
        'dark:[color-scheme:dark]',
        hasError()
          ? 'border-red-500 focus:border-red-500 focus:ring-1 focus:ring-red-500'
          : 'border-slate-200 dark:border-slate-700 focus:border-rose-gold-500 focus:ring-1 focus:ring-rose-gold-500',
      ]"
    />
  </div>

  <!-- Error message -->
  @if (hasError()) {
    <span class="text-xs font-medium text-red-500 animate-fade-in">
      {{ errorMessage() || ('form.error_date' | transloco) }}
    </span>
  }
</div>
