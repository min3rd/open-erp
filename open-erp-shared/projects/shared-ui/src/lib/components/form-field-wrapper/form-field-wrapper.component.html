<div class="flex flex-col w-full gap-1.5" [class]="wrapperClass()">

  <!-- Label -->
  @if (label()) {
    <label class="text-xs font-semibold text-slate-700 dark:text-slate-300 select-none flex items-center gap-1">
      {{ label() }}
      @if (required()) {
        <span class="text-rose-500 font-bold leading-none" [attr.aria-label]="'form.required_indicator' | transloco">*</span>
      }
    </label>
  }

  <!-- Control slot -->
  <ng-content />

  <!-- Helper text -->
  @if (helperText() && !hasError()) {
    <span class="text-xs text-slate-400 dark:text-slate-500">{{ helperText() }}</span>
  }

  <!-- Error message -->
  @if (hasError() && errorMessage()) {
    <span class="text-xs font-medium text-red-500 animate-fade-in flex items-center gap-1">
      <svg class="w-3 h-3 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
      </svg>
      {{ errorMessage() }}
    </span>
  }

</div>
