services:
  mongodb:
    # NOTE: mongo:7.0+ requires AVX CPU support (SERVER-54407).
    # On non-AVX hosts (local dev), use mongo:4.4 as workaround.
    # Staging/production must run on AVX-capable hardware for mongo:7.0.
    image: mongo:4.4
    container_name: open-erp-mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongo --host localhost --port 27017 --quiet --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      erp-network:
        ipv4_address: 172.20.0.10

  mongodb-rs-init:
    image: mongo:4.4
    container_name: open-erp-mongodb-rs-init
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_RS_NAME: ${MONGO_RS_NAME}
    volumes:
      - ./infra/scripts/init-mongo-rs.sh:/scripts/init-mongo-rs.sh:ro
    command: ["bash", "/scripts/init-mongo-rs.sh"]
    restart: "no"
    networks:
      erp-network:
        ipv4_address: 172.20.0.11

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: open-erp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      erp-network:
        ipv4_address: 172.20.0.20

  redis:
    image: redis:7.2-alpine
    container_name: open-erp-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      erp-network:
        ipv4_address: 172.20.0.30

  minio:
    image: minio/minio:latest
    container_name: open-erp-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      erp-network:
        ipv4_address: 172.20.0.40

  adminer:
    image: adminer:latest
    container_name: open-erp-adminer
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT}:8080"
    restart: unless-stopped
    networks:
      erp-network:
        ipv4_address: 172.20.0.50

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: open-erp-redis-commander
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "${REDIS_COMMANDER_PORT}:8081"
    restart: unless-stopped
    networks:
      erp-network:
        ipv4_address: 172.20.0.60

volumes:
  mongodb_data:
  rabbitmq_data:
  redis_data:
  minio_data:

networks:
  erp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
